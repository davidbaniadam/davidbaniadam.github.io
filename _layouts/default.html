<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
    <style>
      /* Styles for header background */
      header {
        background-image: url("/images/ssms-properties.png"); /* Path to the image in your images folder */
        background-size: cover;
        background-position: center;
        padding: 20px;
        color: white;
        text-align: center; /* Center the content */
      }
      
      h1 {
        margin: 0;
      }
      
      nav ul {
        list-style: none;
        padding: 0;
      }

      nav ul li {
        display: inline;
        margin-right: 10px;
      }
      
      nav ul li a {
        color: white; /* Ensure the links are visible on the background */
        text-decoration: none;
      }
    </style>
</head>
<body>
    <header>
        <h1>{{ site.title }}</h1>
        <nav>
            <ul>
                <li><a href="{{ "/" | absolute_url }}">Home</a></li>
                <li><a href="{{ "/about" | absolute_url }}">About</a></li>
                <li><a href="{{ "/contact" | absolute_url }}">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
    </footer>
</body>
</html>
